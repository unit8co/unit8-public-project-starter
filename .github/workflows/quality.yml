name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  python:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: python -m pip install uv==0.7.18
      - name: Sync dependencies
        run: uv sync --dev
      - name: Ruff
        run: uv run ruff check .
      - name: Ruff format
        run: uv run ruff format --check .
      - name: MyPy
        run: uv run mypy src
      - name: Pytest
        run: uv run pytest --cov=agentic_project_starter --cov-report=term-missing

  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t agentic-project-starter .

  terraform:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5
      - name: Terraform fmt
        run: terraform fmt -check -recursive infra/terraform
      - name: Terraform init and validate
        run: |
          for dir in infra/terraform/environments/azure infra/terraform/environments/aws infra/terraform/environments/gcp; do
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  change-quiz:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Fetch base branch
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        run: git fetch origin "${{ github.base_ref }}:refs/remotes/origin/${{ github.base_ref }}"
      - uses: actions/setup-python@v5
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        with:
          python-version: "3.12"
      - name: Install uv
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        run: python -m pip install uv==0.7.18
      - name: Sync dependencies
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        run: uv sync --dev
      - name: Verify change quiz
        if: vars.CHANGE_QUIZ_REQUIRED != 'false'
        run: uv run agentic-starter quiz-changes --verify --base "origin/${{ github.base_ref }}" --head HEAD
